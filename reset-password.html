    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Reset Password | ATSHack</title>
    <meta name="theme-color" content="#07080a">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Host+Grotesk:ital,wght@0,300..800;1,300..800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-grid" aria-hidden="true"></div>
<div class="bg-glow" aria-hidden="true"></div>
<div class="bg-noise" aria-hidden="true"></div>

<header class="nav">
    <div class="nav-inner">
        <a href="/" class="nav-brand">
            <span class="brand-dot"></span>
            <span class="brand-name">ATSHack</span>
        </a>
        <nav class="nav-links">
            <a href="/#how-it-works">How it works</a>
            <a href="/#pricing">Pricing</a>
            <a href="/login.html">Sign in</a>
        </nav>
    </div>
</header>

<main class="auth-main">
    <div class="auth-card">
        <form id="resetForm" class="auth-form">
            <h1 class="auth-h">Set a new password.</h1>
            <p class="auth-sub" id="resetSub">Enter the password you'd like to use from now on.</p>

            <label class="auth-label">
                <span>New password</span>
                <input type="password" name="password" required minlength="6" autocomplete="new-password" autofocus>
                <small class="auth-hint">At least 6 characters.</small>
            </label>
            <label class="auth-label">
                <span>Confirm new password</span>
                <input type="password" name="confirm" required minlength="6" autocomplete="new-password">
            </label>

            <button type="submit" class="submit-btn submit-btn--inline">
                <span class="submit-btn__label">Update password</span>
            </button>

            <div class="auth-msg" id="resetMsg" aria-live="polite"></div>
        </form>
    </div>
</main>

<footer class="footer">
    <div class="footer-inner">
        <div class="footer-brand">
            <span class="brand-dot"></span>
            <span>ATSHack</span>
        </div>
        <div class="footer-links">
            <a href="/#how-it-works">How it works</a>
            <a href="/#pricing">Pricing</a>
            <a href="/blog/">Blog</a>
            <a href="/privacy.html">Privacy</a>
            <a href="mailto:contact@atshack.com">contact@atshack.com</a>
        </div>    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth-config.js"></script>
<script>
(function() {
    var sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_PUBLISHABLE_KEY, {
        auth: { detectSessionInUrl: true, persistSession: true, autoRefreshToken: true }
    });

    var form = document.getElementById('resetForm');
    var msg = document.getElementById('resetMsg');
    var sub = document.getElementById('resetSub');

    function setMsg(text, isError) {
        msg.textContent = text;
        msg.className = 'auth-msg ' + (isError ? 'auth-msg--error' : 'auth-msg--ok');
    }

    // Supabase puts the recovery token in the URL hash. detectSessionInUrl: true
    // exchanges it for a session automatically. We just need to wait for that to settle.
    var ready = false;
    sb.auth.onAuthStateChange(function(event, session) {
        if (event === 'PASSWORD_RECOVERY' || (session && !ready)) {
            ready = true;
        }
    });

    // Fallback: if the page was opened directly (no recovery hash), require sign-in.
    setTimeout(async function() {
        var res = await sb.auth.getSession();
        if (!res.data.session && !window.location.hash.includes('type=recovery')) {
            sub.textContent = 'You need a recovery link to reset your password. Request one from the Sign In page.';
            form.querySelector('button[type="submit"]').disabled = true;
        }
    }, 600);

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        var fd = new FormData(form);
        var pw = fd.get('password') || '';
        var confirm = fd.get('confirm') || '';
        if (pw.length < 6) { setMsg('Password must be at least 6 characters.', true); return; }
        if (pw !== confirm) { setMsg('Passwords do not match.', true); return; }

        var btn = form.querySelector('button[type="submit"]');
        var label = btn.querySelector('.submit-btn__label');
        btn.disabled = true; label.textContent = 'Updating...';
        setMsg('', false);

        var res = await sb.auth.updateUser({ password: pw });
        if (res.error) {
            setMsg(res.error.message, true);
            btn.disabled = false; label.textContent = 'Update password';
        } else {
            setMsg('Password updated. Redirecting...', false);
            setTimeout(function() { window.location.href = '/account.html'; }, 1200);
        }
    });
})();
</script>

</body>
</html>
