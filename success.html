<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Resume Ready - ResumeGo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="nav">
        <div class="container nav-inner">
            <a href="/" class="nav-brand">Resume<span>Go</span></a>
            <div class="nav-links">
                <a href="/" class="btn btn-sm">Tailor Another</a>
            </div>
        </div>
    </nav>

    <section class="hero" style="padding: 4rem 0;">
        <div class="container">
            <h1 style="font-size: 2rem;">Your resume is ready</h1>
            <p class="hero-sub">Your tailored resume has been generated. Download it below.</p>
            <div id="loading" style="margin: 2rem 0;">
                <span class="spinner" style="border-color: rgba(37,99,235,0.3); border-top-color: #2563EB; width: 40px; height: 40px;"></span>
                <p style="margin-top: 1rem; color: #64748B;">Preparing your files...</p>
            </div>
            <div id="downloads" style="display:none; margin: 2rem 0;"></div>
            <div id="error" style="display:none; margin: 2rem 0; padding: 1.5rem; background: rgba(220,38,38,0.05); border: 1px solid rgba(220,38,38,0.2); border-radius: 10px; color: #DC2626;"></div>
        </div>
    </section>

    <script>
    var params = new URLSearchParams(window.location.search);
    var sessionId = params.get('session_id');
    if (sessionId) {
        fetch('https://n8n.myaibuffet.com/webhook/resume-success?session_id=' + sessionId)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            document.getElementById('loading').style.display = 'none';
            if (data.resume_pdf_url) {
                var html = '<a href="' + data.resume_pdf_url + '" target="_blank" class="btn btn-lg download-btn">Download Resume PDF</a>';
                if (data.cover_letter_pdf_url) {
                    html += '<a href="' + data.cover_letter_pdf_url + '" target="_blank" class="btn btn-lg download-btn" style="background:#059669; margin-left: 0.5rem;">Download Cover Letter PDF</a>';
                }
                html += '<p style="margin-top: 1.5rem; color: #64748B; font-size: 0.9rem;">Files are available for 24 hours. Save them now.</p>';
                document.getElementById('downloads').innerHTML = html;
                document.getElementById('downloads').style.display = 'block';
            } else {
                document.getElementById('error').textContent = data.error || 'Something went wrong generating your resume. Email contact@stromation.com for help.';
                document.getElementById('error').style.display = 'block';
            }
        })
        .catch(function() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').textContent = 'Connection error. Refresh the page or email contact@stromation.com.';
            document.getElementById('error').style.display = 'block';
        });
    } else {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').textContent = 'No session found. Go back and try again.';
        document.getElementById('error').style.display = 'block';
    }
    </script>
</body>
</html>
