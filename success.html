<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Your Resume is Ready - ResumeGo</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="nav">
        <div class="container nav-inner">
            <a href="/" class="nav-brand">Resume<span>Go</span></a>
            <div class="nav-links">
                <a href="/" class="btn btn-sm">Tailor Another</a>
            </div>
        </div>
    </nav>

    <section class="hero" style="padding:4rem 0;min-height:60vh;display:flex;align-items:center;">
        <div class="container" style="width:100%;">
            <!-- Loading -->
            <div id="loading" style="text-align:center;">
                <div class="spinner" style="width:48px;height:48px;border-width:4px;border-color:rgba(99,102,241,.2);border-top-color:var(--primary);margin:0 auto;"></div>
                <h2 style="margin-top:1.5rem;font-size:1.5rem;">Generating your tailored resume...</h2>
                <p style="color:var(--text-dim);margin-top:.5rem;">This takes about 30 seconds. Please dont close this page.</p>
            </div>

            <!-- Success -->
            <div id="success" style="display:none;text-align:center;">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2" style="margin:0 auto;"><circle cx="12" cy="12" r="10"/><path d="M8 12l2.5 2.5L16 9"/></svg>
                <h2 style="margin-top:1rem;font-size:1.5rem;">Your tailored resume is ready</h2>
                <p style="color:var(--text-dim);margin-top:.5rem;margin-bottom:2rem;">Download your files below. They are available for 24 hours.</p>
                <div id="downloadBtns"></div>
                <div id="preview" style="margin-top:2rem;text-align:left;max-width:620px;margin-left:auto;margin-right:auto;"></div>
                <div style="margin-top:2rem;">
                    <a href="/" class="btn btn-outline">Tailor Another Resume</a>
                </div>
            </div>

            <!-- Error -->
            <div id="error" style="display:none;text-align:center;">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2" style="margin:0 auto;"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>
                <h2 style="margin-top:1rem;font-size:1.5rem;">Something went wrong</h2>
                <p id="errorMsg" style="color:var(--text-dim);margin-top:.5rem;margin-bottom:2rem;"></p>
                <a href="/" class="btn">Try Again</a>
            </div>
        </div>
    </section>

    <script>
    var params = new URLSearchParams(window.location.search);
    var sessionId = params.get('session_id');

    if (!sessionId) {
        showError('No payment session found. Please go back and try again.');
    } else {
        fetch('https://n8n.myaibuffet.com/webhook/resume-tailor', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mode: 'fulfill', session_id: sessionId })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.resume_text) {
                showSuccess(data);
            } else {
                showError(data.error || 'Failed to generate your resume. Email contact@stromation.com for help.');
            }
        })
        .catch(function() {
            showError('Connection error. Refresh the page to try again, or email contact@stromation.com.');
        });
    }

    function showSuccess(data) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('success').style.display = 'block';

        var btns = document.getElementById('downloadBtns');
        var html = '';

        // For now show text preview with copy button (PDF generation next step)
        var preview = document.getElementById('preview');
        preview.innerHTML = '<details open><summary style="cursor:pointer;font-weight:700;font-size:.95rem;margin-bottom:.75rem;">Resume</summary>'
            + '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;white-space:pre-wrap;font-size:.85rem;line-height:1.65;color:var(--text-mid);">'
            + escapeHtml(data.resume_text) + '</div>'
            + '<button onclick="copyText(this, \'' + escapeAttr(data.resume_text) + '\')" class="btn btn-sm" style="margin-top:.75rem;">Copy Resume Text</button>'
            + '</details>';

        if (data.cover_letter_text) {
            preview.innerHTML += '<details style="margin-top:1.5rem;"><summary style="cursor:pointer;font-weight:700;font-size:.95rem;margin-bottom:.75rem;">Cover Letter</summary>'
                + '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;white-space:pre-wrap;font-size:.85rem;line-height:1.65;color:var(--text-mid);">'
                + escapeHtml(data.cover_letter_text) + '</div>'
                + '<button onclick="copyText(this, \'' + escapeAttr(data.cover_letter_text) + '\')" class="btn btn-sm" style="margin-top:.75rem;background:#059669;">Copy Cover Letter</button>'
                + '</details>';
        }
    }

    function showError(msg) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('errorMsg').textContent = msg;
    }

    function escapeHtml(str) {
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function escapeAttr(str) {
        return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');
    }

    function copyText(btn, text) {
        text = text.replace(/\\n/g, '\n');
        navigator.clipboard.writeText(text).then(function() {
            btn.textContent = 'Copied!';
            setTimeout(function() { btn.textContent = btn.textContent.indexOf('Cover') >= 0 ? 'Copy Cover Letter' : 'Copy Resume Text'; }, 2000);
        });
    }
    </script>
</body>
</html>
